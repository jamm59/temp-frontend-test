<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Borrow Records — LibraryMS</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<main class="main">
  <div class="page-head-row">
    <div class="page-head" style="margin-bottom:0;">
      <h1>Borrow Records</h1>
      <p>Manage all borrowing activity.</p>
    </div>
    <button class="btn btn-primary" onclick="openIssueModal()">+ Issue Book</button>
  </div>

  <div class="filter-row">
    <select class="filter-select" id="status-filter">
      <option value="">All Records</option>
      <option value="active">Active</option>
      <option value="overdue">Overdue</option>
      <option value="returned">Returned</option>
    </select>
  </div>

  <div class="card">
    <div class="card-scroll">
      <table>
        <thead>
          <tr><th>Book</th><th>Member</th><th>Borrowed Date</th><th>Due Date</th><th>Status</th><th></th></tr>
        </thead>
        <tbody id="borrow-rows"><tr><td colspan="6" class="hint" style="padding:20px;">Loading…</td></tr></tbody>
      </table>
    </div>
    <div id="empty" class="empty-state" style="display:none;">
      <div class="icon-circle" id="empty-icon"></div>
      <div style="font-weight:700; color:var(--text);">Nothing here</div>
      <p>No records match this filter.</p>
    </div>
  </div>
</main>

<div class="overlay" id="issue-modal">
  <div class="modal">
    <div class="modal-head">
      <h3>Issue a book</h3>
      <button class="modal-close" onclick="closeModal('issue-modal')">&times;</button>
    </div>
    <form id="issue-form">
      <div class="field">
        <label for="member-select">Member</label>
        <select id="member-select" required></select>
      </div>
      <div class="field">
        <label for="book-select">Book</label>
        <select id="book-select" required></select>
      </div>
      <div class="field">
        <label for="loan-days">Loan period</label>
        <select id="loan-days">
          <option value="7">7 days</option>
          <option value="14" selected>14 days</option>
          <option value="21">21 days</option>
          <option value="30">30 days</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Confirm issue</button>
    </form>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
  Auth.requireLogin();
  renderChrome('borrow.html', 'Library Management');
  document.getElementById('empty-icon').innerHTML = ICON.borrowing;

  async function openIssueModal() {
    const [members, books] = await Promise.all([API.getMembers(), API.getBooks()]);
    const memberSelect = document.getElementById('member-select');
    const bookSelect = document.getElementById('book-select');

    memberSelect.innerHTML = members.map(m => `<option value="${m.id}">${escapeHtml(m.name)} (ID: ${m.id})</option>`).join('');

    const available = books.filter(b => b.available > 0);
    bookSelect.innerHTML = available.length
      ? available.map(b => `<option value="${b.id}">${escapeHtml(b.title)} — ${b.available} available</option>`).join('')
      : `<option value="">No books currently available</option>`;

    openModal('issue-modal');
  }

  document.getElementById('issue-form').addEventListener('submit', async e => {
    e.preventDefault();
    const memberId = document.getElementById('member-select').value;
    const bookId = document.getElementById('book-select').value;
    const days = document.getElementById('loan-days').value;
    if (!bookId) { showToast('No book selected.'); return; }

    try {
      await API.issueBook(bookId, memberId, days);
      showToast('Book issued successfully.');
      closeModal('issue-modal');
      render();
    } catch (err) { showToast(err.message); }
  });

  async function doReturn(recordId) {
    try {
      const result = await API.returnBook(recordId);
      showToast(result.fine > 0 ? `Returned — fine due: ${result.fine} FCFA` : 'Returned — no fine due.');
      render();
    } catch (err) { showToast(err.message); }
  }

  document.getElementById('status-filter').addEventListener('change', render);

  async function render() {
    const filter = document.getElementById('status-filter').value;
    let rows = await API.getBorrows(filter === 'overdue' ? undefined : (filter || undefined));
    if (filter === 'overdue') rows = rows.filter(r => r.status === 'Overdue');

    document.getElementById('empty').style.display = rows.length ? 'none' : 'block';
    document.getElementById('borrow-rows').innerHTML = rows.length ? rows.map(r => {
      const pillClass = r.status === 'Returned' ? 'pill-green' : r.status === 'Overdue' ? 'pill-red' : 'pill-blue';
      return `<tr>
        <td>
          <div class="cell-title">${escapeHtml(r.book_title)}</div>
          <div class="cell-sub">${escapeHtml(r.book_author)}</div>
        </td>
        <td>
          <div class="cell-title" style="font-weight:600;">${escapeHtml(r.member_name)}</div>
          <div class="cell-sub">ID: ${r.member_id}</div>
        </td>
        <td>${fmtDate(r.borrowed_date)}</td>
        <td>${fmtDate(r.due_date)}</td>
        <td><span class="pill ${pillClass}">${r.status}</span></td>
        <td style="text-align:right;">
          ${r.status !== 'Returned' ? `<button class="btn btn-ghost btn-sm" onclick="doReturn(${r.id})">Mark returned</button>` : ''}
        </td>
      </tr>`;
    }).join('') : '';
  }

  render().catch(err => showToast(err.message));
</script>
</body>
</html>
