<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — LibraryMS</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<main class="main">
  <div class="page-head" id="welcome-head">
    <h1>Welcome back &#128075;</h1>
    <p>Here is an overview of the library's status today.</p>
  </div>

  <div class="stat-grid" id="stat-grid">
    <div class="hint">Loading…</div>
  </div>

  <div class="card card-pad" style="margin-bottom:20px;">
    <div class="page-head-row" style="margin-bottom:14px;">
      <div>
        <h3>Recently borrowed</h3>
        <p class="hint" style="margin-top:2px;">The five most recent circulation records.</p>
      </div>
      <a href="borrow.html" class="btn btn-ghost btn-sm">View all</a>
    </div>
    <div class="card-scroll">
      <table>
        <thead><tr><th>Book</th><th>Member</th><th>Due</th><th>Status</th></tr></thead>
        <tbody id="recent-rows"><tr><td colspan="4" class="hint">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="card card-pad">
    <h3 style="margin-bottom:12px;">Quick actions</h3>
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <a href="books.html" class="btn btn-primary">+ Add a book</a>
      <a href="members.html" class="btn btn-outline">+ Register a member</a>
      <a href="borrow.html" class="btn btn-ghost">Issue / return</a>
      <a href="reports.html" class="btn btn-ghost">View reports</a>
    </div>
  </div>
</main>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
  const currentUser = Auth.requireLogin();
  renderChrome('dashboard.html', 'LibraryMS');

  if (currentUser) {
    const firstName = currentUser.name.split(' ')[0];
    document.querySelector('#welcome-head h1').innerHTML = `Welcome back, ${escapeHtml(firstName)} &#128075;`;
  }

  async function load() {
    const [summary, recent] = await Promise.all([API.getSummary(), API.getBorrows()]);
    const activeCount = recent.filter(r => r.status !== 'Returned').length;

    document.getElementById('stat-grid').innerHTML = `
      <div class="stat-card">
        <div class="stat-top">
          <div class="stat-label">Total Books</div>
          <div class="stat-icon">${ICON.book}</div>
        </div>
        <div class="stat-num">${summary.totalBooks}</div>
        <div class="stat-sub">In catalog</div>
      </div>
      <div class="stat-card">
        <div class="stat-top">
          <div class="stat-label">Active Borrows</div>
          <div class="stat-icon">${ICON.clock}</div>
        </div>
        <div class="stat-num">${activeCount}</div>
        <div class="stat-sub">0 new today</div>
      </div>
      <div class="stat-card ${summary.overdueCount ? 'danger' : ''}">
        <div class="stat-top">
          <div class="stat-label">Overdue Books</div>
          <div class="stat-icon">${ICON.warning}</div>
        </div>
        <div class="stat-num">${summary.overdueCount}</div>
        <div class="stat-sub">Require attention</div>
      </div>
    `;

    const top5 = recent.slice(0, 5);
    document.getElementById('recent-rows').innerHTML = top5.length ? top5.map(r => {
      const pillClass = r.status === 'Returned' ? 'pill-green' : r.status === 'Overdue' ? 'pill-red' : 'pill-blue';
      return `<tr>
        <td class="cell-title">${escapeHtml(r.book_title)}</td>
        <td>${escapeHtml(r.member_name)}</td>
        <td>${fmtDate(r.due_date)}</td>
        <td><span class="pill ${pillClass}">${r.status}</span></td>
      </tr>`;
    }).join('') : `<tr><td colspan="4" class="hint">No borrowing activity yet.</td></tr>`;
  }

  load().catch(err => showToast(err.message));
</script>
</body>
</html>
